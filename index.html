<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuzone - AI Chat (Pop/Serenade)</title>
    <!-- Markdown解析ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Noto Sans JP フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f4f9;
            --chat-bg: #ffffff;
            --primary-color: #4a90e2;
            --serenade-color: #9b59b6;
            --pop-color: #3498db;
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            height: 100%;
        }

        /* Header */
        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mode-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }
        .mode-pop { background-color: var(--pop-color); }
        .mode-serenade { background-color: var(--serenade-color); }

        /* Login Overlay */
        #login-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 300px;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }

        /* Chat Area */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.assistant {
            align-self: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .user .avatar { background: #888; }
        .assistant .avatar { background: var(--primary-color); }
        .assistant.serenade .avatar { background: var(--serenade-color); }

        .bubble {
            background: #f0f0f0;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .user .bubble {
            background: var(--primary-color);
            color: white;
        }
        .assistant .bubble {
            background: white;
            border: 1px solid var(--border-color);
            color: #222;
        }

        /* Markdown Styles within Bubble */
        .bubble h1, .bubble h2, .bubble h3 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #2c3e50;
            font-weight: 700;
        }
        .bubble h1 { font-size: 1.4em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
        .bubble h2 { font-size: 1.2em; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        .bubble p { margin: 0.8em 0; }
        .bubble ul, .bubble ol { padding-left: 20px; margin: 0.8em 0; }
        .bubble li { margin-bottom: 0.4em; }
        .bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            font-size: 0.9em;
        }
        .bubble th, .bubble td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        .bubble th { background-color: #f8f9fa; font-weight: bold; }
        .bubble blockquote {
            border-left: 4px solid #ddd;
            margin: 1em 0;
            padding-left: 1em;
            color: #666;
            background: #fafafa;
            padding: 10px;
        }
        .bubble code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .bubble pre {
            background: #2d2d2d;
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .bubble pre code {
            background: transparent;
            color: inherit;
            padding: 0;
        }

        /* Sub-steps (Serenade Details) */
        .sub-steps-container {
            margin-top: 15px;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }
        .sub-step-item {
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
            overflow: hidden;
        }
        .sub-step-header {
            background: #f9f9f9;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            user-select: none;
        }
        .sub-step-header:hover { background: #f0f0f0; }
        .sub-step-content {
            display: none;
            padding: 12px;
            background: #fff;
            font-size: 0.85rem;
            color: #555;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid #eee;
        }
        .sub-step-content.open { display: block; }

        /* Action Bar (PDF Download) */
        .action-bar {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn-pdf {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn-pdf:hover { background: #c0392b; }
        .btn-pdf.disabled {
            background: #ccc;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: #fff;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            opacity: 0.6;
            transition: all 0.2s;
            background: #f0f0f0;
            color: #555;
        }
        .mode-btn.active {
            opacity: 1;
            transform: scale(1.02);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .mode-btn[data-mode="pop"].active {
            background: var(--pop-color);
            color: white;
            border-color: var(--pop-color);
        }
        .mode-btn[data-mode="serenade"].active {
            background: var(--serenade-color);
            color: white;
            border-color: var(--serenade-color);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }
        textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
            height: 60px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        textarea:focus { border-color: var(--primary-color); }
        
        button#send-btn {
            width: 80px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button#send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        button#send-btn.serenade-active {
            background: var(--serenade-color);
        }

        /* Loading Animation */
        .typing-indicator {
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #aaa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .container { height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top:0;">Fuzone Login</h2>
            <p style="font-size:0.9rem; color:#666;">アカウント名とパスワードを入力してください</p>
            <input type="text" id="username-input" placeholder="ユーザー名 (例: taro)" autocomplete="username">
            <input type="password" id="password-input" placeholder="パスワード" autocomplete="current-password">
            <button onclick="handleLogin()">ログイン / 作成</button>
            <p id="login-error" style="color:red; font-size:0.8rem; display:none;"></p>
        </div>
    </div>

    <!-- Header -->
    <header>
        <h1>
            Fuzone 
            <span id="current-mode-badge" class="mode-badge mode-pop">POP</span>
        </h1>
        <div style="font-size: 0.8rem; color: #888;" id="user-display"></div>
    </header>

    <!-- Chat History -->
    <div id="chat-history">
        <!-- Messages will appear here -->
        <div class="message assistant">
            <div class="avatar">AI</div>
            <div class="bubble">
                ようこそ！<br>
                Popモード：簡潔な回答（500字程度）<br>
                Serenadeモード：詳細なレポート（2500字程度）<br>
                どちらのモードで話しましょうか？
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pop" onclick="setMode('pop')">Pop (簡潔)</button>
            <button class="mode-btn" data-mode="serenade" onclick="setMode('serenade')">Serenade (詳細)</button>
        </div>
        <div class="input-row">
            <textarea id="user-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
            <button id="send-btn" onclick="sendMessage()">送信</button>
        </div>
    </div>
</div>

<script>
    // ▼▼▼ ここに GAS のウェブアプリURLを入力してください ▼▼▼
    const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbx2zyaWi0KKxHWpOfODMjIu3NMlE06nSmvORjUznbeGO-qjwVe6DTwAIzUzuqGLCXnWNA/exec";
    // ▲▲▲ ここまで ▲▲▲

    let currentMode = 'pop';
    let currentUser = '';
    let currentPassword = '';
    let isProcessing = false;

    // モード切り替え
    function setMode(mode) {
        if (isProcessing) return;
        currentMode = mode;
        
        // UI更新
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.mode === mode) btn.classList.add('active');
        });
        
        const badge = document.getElementById('current-mode-badge');
        badge.textContent = mode.toUpperCase();
        badge.className = `mode-badge mode-${mode}`;
        
        const sendBtn = document.getElementById('send-btn');
        if (mode === 'serenade') {
            sendBtn.classList.add('serenade-active');
        } else {
            sendBtn.classList.remove('serenade-active');
        }
    }

    // ログイン処理
    async function handleLogin() {
        const username = document.getElementById('username-input').value.trim();
        const password = document.getElementById('password-input').value.trim();
        const errorEl = document.getElementById('login-error');

        if (!username || !password) {
            errorEl.textContent = "ユーザー名とパスワードを入力してください。";
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';
        const btn = document.querySelector('.login-box button');
        btn.disabled = true;
        btn.textContent = "処理中...";

        try {
            const response = await fetch(GAS_ENDPOINT, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                })
            });
            const data = await response.json();

            if (data.ok) {
                currentUser = username;
                currentPassword = password;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('user-display').textContent = `User: ${currentUser}`;
                
                if (data.memory) {
                    addMessage('assistant', `以前の記憶を読み込みました:\n${data.memory}`, false);
                }
            } else {
                throw new Error(data.error || "ログインに失敗しました");
            }
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = "ログイン / 作成";
        }
    }

    // メッセージ送信
    async function sendMessage() {
        if (isProcessing) return;
        
        const inputEl = document.getElementById('user-input');
        const message = inputEl.value.trim();
        
        if (!message) return;

        // UIにユーザーメッセージ追加
        addMessage('user', message);
        inputEl.value = '';
        
        // ローディング表示
        const loadingId = addLoadingMessage();
        isProcessing = true;
        document.getElementById('send-btn').disabled = true;

        try {
            // 会話履歴の構築 (直近の数件を送信するのが一般的ですが、ここでは簡易的に全送または直近のみ)
            // 実際の実装では、トークン制限を考慮して履歴を調整する必要があります。
            // 今回はシンプルに、直前のユーザー発言とコンテキストを渡す形ですが、
            // 本来は chat-history から messages 配列を再構築するのが理想です。
            // ここでは実装上の簡略化のため、直近のメッセージのみをコンテキストとして渡し、
            // サーバー側でスプレッドシートの記憶を利用する仕様になっています。
            // ※より正確にするには、DOMから履歴を読み取って配列にする必要があります。
            
            const messages = [];
            // DOMから過去の会話を拾って配列化 (システムプロンプト等は除く)
            const historyBubbles = document.querySelectorAll('#chat-history .message');
            historyBubbles.forEach(msg => {
                const role = msg.classList.contains('user') ? 'user' : 'assistant';
                // Markdownがレンダリングされているので、innerTextでテキストを取得
                // ただし、サブステップなどは含めないように注意が必要だが、
                // 簡易的には bubble クラスのテキストを使用
                const text = msg.querySelector('.bubble').innerText; 
                // 記憶ブロックなどが含まれている可能性があるが、サーバー側で再計算されるため問題なし
                messages.push({ role: role, content: text });
            });

            const payload = {
                username: currentUser,
                password: currentPassword,
                mode: currentMode,
                messages: messages
            };

            const response = await fetch(GAS_ENDPOINT, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            // ローディング削除
            removeMessage(loadingId);

            if (data.error) {
                addMessage('assistant', `エラー: ${data.error}`);
            } else {
                // 回答表示
                addMessage('assistant', data.content, true, data.subSteps, data.pdfUrl);
            }

        } catch (err) {
            removeMessage(loadingId);
            addMessage('assistant', `通信エラー: ${err.message}`);
        } finally {
            isProcessing = false;
            document.getElementById('send-btn').disabled = false;
            inputEl.focus();
        }
    }

    // メッセージ追加関数
    function addMessage(role, text, isAssistant = false, subSteps = null, pdfUrl = null) {
        const history = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        if (isAssistant && currentMode === 'serenade') {
            msgDiv.classList.add('serenade');
        }

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? 'U' : 'AI';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';

        if (isAssistant) {
            // Markdown レンダリング
            bubble.innerHTML = marked.parse(text);
            
            // PDF ボタンとサブステップ表示
            if (pdfUrl || subSteps) {
                const actionBar = document.createElement('div');
                actionBar.className = 'action-bar';
                
                if (pdfUrl) {
                    const pdfBtn = document.createElement('a');
                    pdfBtn.href = pdfUrl;
                    pdfBtn.target = '_blank';
                    pdfBtn.className = 'btn-pdf';
                    pdfBtn.innerHTML = '📄 PDFで保存';
                    // ダウンロード属性はクロスオリジンでは効かないことが多いので、新規タブで開く
                    actionBar.appendChild(pdfBtn);
                }

                bubble.appendChild(actionBar);

                if (subSteps && subSteps.length > 0) {
                    const stepsContainer = document.createElement('div');
                    stepsContainer.className = 'sub-steps-container';
                    
                    subSteps.forEach((step, index) => {
                        const item = document.createElement('div');
                        item.className = 'sub-step-item';
                        
                        const header = document.createElement('div');
                        header.className = 'sub-step-header';
                        header.innerHTML = `<span>${step.title}</span> <span>▼</span>`;
                        header.onclick = () => {
                            content.classList.toggle('open');
                            header.querySelector('span:last-child').textContent = content.classList.contains('open') ? '▲' : '▼';
                        };

                        const content = document.createElement('div');
                        content.className = 'sub-step-content';
                        content.textContent = step.content;

                        item.appendChild(header);
                        item.appendChild(content);
                        stepsContainer.appendChild(item);
                    });

                    bubble.appendChild(stepsContainer);
                }
            }
        } else {
            bubble.textContent = text;
        }

        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        history.appendChild(msgDiv);
        
        // 最下部へスクロール
        history.scrollTop = history.scrollHeight;
    }

    // ローディングメッセージ追加
    function addLoadingMessage() {
        const id = 'loading-' + Date.now();
        const history = document.getElementById('chat-history');
        const msgDiv = document.createElement('div');
        msgDiv.id = id;
        msgDiv.className = 'message assistant';
        
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = 'AI';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        history.appendChild(msgDiv);
        history.scrollTop = history.scrollHeight;
        
        return id;
    }

    // メッセージ削除
    function removeMessage(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // 初期化
    setMode('pop');
</script>

</body>
</html>
