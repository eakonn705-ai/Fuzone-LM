<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuzone — AIチャット</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root{
    --bg: #14130f;
    --panel: #1d1b16;
    --panel-light: #262318;
    --accent: #e8a23a;
    --accent-dim: #8a611f;
    --text: #ece6d6;
    --text-dim: #9c9586;
    --user-bubble: #3a3424;
    --bot-bubble: #211f18;
    --border: #34301f;
    --danger: #c2543a;
    --radius: 14px;
    --font-display: 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Consolas', monospace;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(232,162,58,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(232,162,58,0.05), transparent 45%);
    color: var(--text);
    font-family: var(--font-body);
    height: 100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* Header */
  header{
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
    background: linear-gradient(180deg, rgba(232,162,58,0.04), transparent);
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand-mark{
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
  }
  .brand-mark span{ color: var(--text); }
  .brand-sub{
    font-size:11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .status{
    font-size: 12px;
    color: var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--accent-dim);
    transition: background .3s;
  }
  .dot.live{ background: #6fae5a; box-shadow: 0 0 8px #6fae5a; }

  /* Chat area */
  main{
    flex:1;
    overflow-y:auto;
    padding: 28px 0 10px;
  }
  .chat-inner{
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
    display:flex;
    flex-direction:column;
    gap: 22px;
  }

  .empty-state{
    margin: 14vh auto;
    text-align:center;
    color: var(--text-dim);
    max-width: 420px;
  }
  .empty-state .glyph{
    font-family: var(--font-display);
    font-size: 54px;
    color: var(--accent);
    opacity:0.85;
    margin-bottom: 6px;
  }
  .empty-state p{
    font-size: 14px;
    line-height: 1.7;
  }

  .msg-row{
    display:flex;
    gap: 12px;
    align-items:flex-start;
  }
  .msg-row.user{ flex-direction: row-reverse; }

  .avatar{
    width: 30px; height:30px;
    border-radius: 8px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    font-family: var(--font-display);
    font-weight:700;
    margin-top:2px;
  }
  .avatar.user{ background: var(--accent); color: #1a1408; }
  .avatar.bot{ background: var(--panel-light); color: var(--accent); border:1px solid var(--border); }

  .bubble{
    max-width: 78%;
    padding: 13px 16px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.65;
    word-wrap: break-word;
  }
  .msg-row.user .bubble{
    background: var(--user-bubble);
    border: 1px solid var(--accent-dim);
    border-top-right-radius: 4px;
  }
  .msg-row.bot .bubble{
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble.thinking{ color: var(--text-dim); font-style: italic; }
  .bubble.error{ border-color: var(--danger); color: #e8b8a8; }

  /* Markdown styling inside bubbles */
  .bubble p{ margin: 0 0 10px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble ul, .bubble ol{ margin: 6px 0 10px 22px; padding:0; }
  .bubble li{ margin-bottom:4px; }
  .bubble h1,.bubble h2,.bubble h3{
    font-family: var(--font-display);
    color: var(--accent);
    margin: 14px 0 8px;
    line-height:1.3;
  }
  .bubble h1{ font-size:19px; }
  .bubble h2{ font-size:17px; }
  .bubble h3{ font-size:15.5px; }
  .bubble code{
    background: rgba(232,162,58,0.12);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .bubble pre{
    background: #100f0b;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    overflow-x:auto;
    margin: 10px 0;
  }
  .bubble pre code{
    background:none;
    color: var(--text);
    padding:0;
  }
  .bubble blockquote{
    border-left: 3px solid var(--accent-dim);
    margin: 10px 0;
    padding-left: 12px;
    color: var(--text-dim);
  }
  .bubble a{ color: var(--accent); text-decoration: underline; }
  .bubble table{ border-collapse: collapse; width:100%; margin: 10px 0; font-size:13.5px; }
  .bubble th, .bubble td{ border:1px solid var(--border); padding:6px 10px; text-align:left; }
  .bubble th{ background: var(--panel-light); color: var(--accent); }
  .bubble hr{ border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* Footer / input */
  footer{
    border-top: 1px solid var(--border);
    padding: 16px 24px 20px;
    background: var(--panel);
    flex-shrink:0;
  }
  .input-wrap{
    max-width: 760px;
    margin: 0 auto;
    display:flex;
    align-items:flex-end;
    gap: 10px;
    background: var(--panel-light);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 8px 8px 16px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within{ border-color: var(--accent-dim); }
  textarea#userInput{
    flex:1;
    background:none;
    border:none;
    outline:none;
    resize:none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14.5px;
    line-height:1.5;
    max-height: 160px;
    padding: 8px 0;
  }
  textarea#userInput::placeholder{ color: var(--text-dim); }
  #sendBtn{
    background: var(--accent);
    color: #1a1408;
    border:none;
    border-radius: 10px;
    width: 38px; height: 38px;
    flex-shrink:0;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s, opacity .15s;
  }
  #sendBtn:hover{ transform: translateY(-1px); }
  #sendBtn:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
  #sendBtn svg{ width:16px; height:16px; }

  .footnote{
    text-align:center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* scrollbar */
  main::-webkit-scrollbar{ width: 8px; }
  main::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 4px; }
  main::-webkit-scrollbar-track{ background: transparent; }

  /* typing dots */
  .typing-dots{ display:inline-flex; gap:4px; align-items:center; }
  .typing-dots span{
    width:6px; height:6px; border-radius:50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){ animation-delay: .15s; }
  .typing-dots span:nth-child(3){ animation-delay: .3s; }
  @keyframes bounce{
    0%,80%,100%{ transform: translateY(0); opacity:0.5; }
    40%{ transform: translateY(-4px); opacity:1; }
  }

  @media (max-width: 600px){
    header{ padding: 14px 16px; }
    .chat-inner{ padding: 0 14px; }
    footer{ padding: 12px 14px 16px; }
    .bubble{ max-width: 86%; }
  }

  /* Password gate */
  .pw-overlay{
    position: fixed;
    inset: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(232,162,58,0.07), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(232,162,58,0.05), transparent 45%);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 1000;
  }
  .pw-overlay.hidden{ display:none; }
  .pw-modal{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px;
    width: 320px;
    text-align:center;
  }
  .pw-icon{ font-size: 30px; margin-bottom: 6px; }
  .pw-modal h2{
    font-family: var(--font-display);
    color: var(--accent);
    margin: 0 0 6px;
    font-size: 20px;
  }
  .pw-modal p{
    color: var(--text-dim);
    font-size: 13px;
    margin: 0 0 18px;
    line-height: 1.6;
  }
  .pw-modal input{
    width: 100%;
    background: var(--panel-light);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .pw-modal input:focus{ border-color: var(--accent-dim); }
  .pw-modal button{
    width: 100%;
    background: var(--accent);
    color: #1a1408;
    border: none;
    border-radius: 10px;
    padding: 11px 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s;
  }
  .pw-modal button:hover{ transform: translateY(-1px); }
  .pw-error{
    color: var(--danger);
    font-size: 12.5px;
    margin-top: 12px;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="pw-overlay" id="pwOverlay">
  <div class="pw-modal">
    <div class="pw-icon">🔒</div>
    <h2>Fuzone にアクセス</h2>
    <p>続けるにはアクセスパスワードを入力してください。</p>
    <input type="password" id="pwInput" placeholder="パスワード" autocomplete="off">
    <button id="pwSubmit">入る</button>
    <div class="pw-error" id="pwError"></div>
  </div>
</div>

<div class="pw-overlay" id="userOverlay" style="display:none;">
  <div class="pw-modal">
    <div class="pw-icon">👤</div>
    <h2>ユーザー名</h2>
    <p>ユーザー名を入力してください。<br>初めての名前なら新しいアカウントが作られ、<br>既存の名前ならその記憶を引き継いで続けられます。</p>
    <input type="text" id="userNameInput" placeholder="ユーザー名" autocomplete="off" maxlength="50">
    <button id="userNameSubmit">始める</button>
    <div class="pw-error" id="userNameError"></div>
  </div>
</div>

<header>
  <div class="brand">
    <div class="brand-mark">Fu<span>zone</span></div>
    <div class="brand-sub">GPT-OSS 120B</div>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">未接続</span>
  </div>
</header>

<main id="chatMain">
  <div class="chat-inner" id="chatInner">
    <div class="empty-state" id="emptyState">
      <div class="glyph">附Z</div>
      <p>Fuzoneへようこそ。<br>下の入力欄からメッセージを送って、Groq GPT-OSS 120Bと話してみましょう。</p>
    </div>
  </div>
</main>

<footer>
  <div class="input-wrap">
    <textarea id="userInput" placeholder="メッセージを入力…" rows="1"></textarea>
    <button id="sendBtn" title="送信">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 11L21 3L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="footnote">Fuzone は GAS プロキシ経由で Groq API（GPT-OSS 120B）を利用しています</div>
</footer>

<script>
/* ============================================================
   ▼▼▼ ここにGASウェブアプリのURLを入力してください ▼▼▼
   Google Apps Script (fuzone-proxy.gs) をデプロイして発行された
   ウェブアプリのURL（https://script.google.com/macros/s/.../exec）
   を貼り付けてください。Groq APIキーはGAS側にのみ保存されます。
   ============================================================ */
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycby-a7qrzay7lM06hEMiEabGp3r8VgO3Voy4Fo75cJcAJWqrsAqrf6kQqRZxYgJkPJGfDw/exec";
/* ============================================================ */
/* アクセスパスワードはコード内には書きません。
   ページを開いたときに入力ダイアログが表示され、入力された値は
   ブラウザのメモリ上にのみ保持されます（ソースコードには残りません）。*/

const chatInner = document.getElementById('chatInner');
const chatMain = document.getElementById('chatMain');
const emptyState = document.getElementById('emptyState');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let conversation = [];
let isSending = false;
let sessionPassword = null;
let currentUsername = null;

const pwOverlay = document.getElementById('pwOverlay');
const pwInput = document.getElementById('pwInput');
const pwSubmit = document.getElementById('pwSubmit');
const pwError = document.getElementById('pwError');

const userOverlay = document.getElementById('userOverlay');
const userNameInput = document.getElementById('userNameInput');
const userNameSubmit = document.getElementById('userNameSubmit');
const userNameError = document.getElementById('userNameError');

function unlock(){
  const val = pwInput.value;
  if(!val){
    pwError.textContent = 'パスワードを入力してください。';
    return;
  }
  sessionPassword = val;
  pwOverlay.classList.add('hidden');
  userOverlay.style.display = 'flex';
  userNameInput.focus();
}

pwSubmit.addEventListener('click', unlock);
pwInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    unlock();
  }
});

async function loginUser(){
  const name = userNameInput.value.trim();
  if(!name){
    userNameError.textContent = 'ユーザー名を入力してください。';
    return;
  }
  if(!GAS_ENDPOINT || GAS_ENDPOINT === "ここにGASウェブアプリのURLを入力"){
    userNameError.textContent = 'GASのURLが未設定です。HTML内の GAS_ENDPOINT を設定してください。';
    return;
  }

  userNameSubmit.disabled = true;
  userNameError.textContent = '確認中…';

  try{
    const response = await fetch(GAS_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ password: sessionPassword, username: name, action: 'login' })
    });

    const data = await response.json();

    if(data.error){
      if(data.error.indexOf('パスワード') !== -1){
        // パスワード自体が誤っていた場合は、パスワード画面に戻す
        sessionPassword = null;
        userOverlay.style.display = 'none';
        pwInput.value = '';
        pwError.textContent = 'パスワードが正しくありません。もう一度入力してください。';
        pwOverlay.classList.remove('hidden');
        return;
      }
      userNameError.textContent = data.error;
      return;
    }

    currentUsername = name;
    userOverlay.style.display = 'none';
    userInput.focus();

    if(data.memory){
      addMessage('bot', '「' + name + '」さん、お帰りなさい。以前の記憶を踏まえて続けます。');
    } else {
      addMessage('bot', '「' + name + '」さんとして新しいアカウントを作成しました。よろしくお願いします。');
    }

  } catch(err){
    userNameError.textContent = '通信エラー: ' + err.message;
  } finally {
    userNameSubmit.disabled = false;
  }
}

userNameSubmit.addEventListener('click', loginUser);
userNameInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    loginUser();
  }
});
// パスワードの正誤はGAS側で検証される。間違っていた場合はチャット送信時にエラーが表示される。

function setStatus(state){
  if(state === 'live'){
    statusDot.classList.add('live');
    statusText.textContent = '接続中';
  } else if(state === 'thinking'){
    statusDot.classList.remove('live');
    statusText.textContent = '応答生成中…';
  } else if(state === 'error'){
    statusDot.classList.remove('live');
    statusText.textContent = 'エラー';
  } else {
    statusDot.classList.remove('live');
    statusText.textContent = '未接続';
  }
}

function scrollToBottom(){
  chatMain.scrollTop = chatMain.scrollHeight;
}

function addMessage(role, content, opts = {}){
  if(emptyState) emptyState.remove();

  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (role === 'user' ? 'user' : 'bot');
  avatar.textContent = role === 'user' ? 'You' : 'F';

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (opts.thinking ? ' thinking' : '') + (opts.error ? ' error' : '');

  if(opts.thinking){
    bubble.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
  } else if(role === 'user'){
    bubble.textContent = content;
  } else {
    bubble.innerHTML = marked.parse(content);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  chatInner.appendChild(row);
  scrollToBottom();
  return bubble;
}

function autoResize(){
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
}
userInput.addEventListener('input', autoResize);

userInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

async function sendMessage(){
  const text = userInput.value.trim();
  if(!text || isSending) return;

  if(!GAS_ENDPOINT || GAS_ENDPOINT === "ここにGASウェブアプリのURLを入力"){
    addMessage('bot', 'GASのウェブアプリURLが設定されていません。HTMLファイル内の `GAS_ENDPOINT` の部分にデプロイ済みのGASウェブアプリURLを入力してください。', {error:true});
    return;
  }
  if(!currentUsername){
    addMessage('bot', 'ユーザー名が設定されていません。ページを再読み込みして、ユーザー名を入力してください。', {error:true});
    return;
  }

  isSending = true;
  sendBtn.disabled = true;
  setStatus('thinking');

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });
  userInput.value = '';
  autoResize();

  const thinkingBubble = addMessage('bot', '', { thinking: true });

  try{
    // GAS側でのCORSプリフライト回避のため text/plain で送信し、
    // GAS側でJSON.parseしてリクエストを処理する
    const response = await fetch(GAS_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify({ password: sessionPassword, username: currentUsername, messages: conversation })
    });

    if(!response.ok){
      const errText = await response.text();
      throw new Error('サーバーエラー (' + response.status + '): ' + errText);
    }

    const data = await response.json();

    if(data.error){
      if(data.error.indexOf('パスワード') !== -1){
        sessionPassword = null;
        pwInput.value = '';
        pwError.textContent = 'パスワードが正しくありません。もう一度入力してください。';
        pwOverlay.classList.remove('hidden');
      }
      throw new Error(data.error + (data.detail ? ' / ' + data.detail : ''));
    }

    const reply = data.choices?.[0]?.message?.content ?? '応答を取得できませんでした。';

    thinkingBubble.classList.remove('thinking');
    thinkingBubble.innerHTML = marked.parse(reply);
    conversation.push({ role: 'assistant', content: reply });
    setStatus('live');

  } catch(err){
    thinkingBubble.classList.remove('thinking');
    thinkingBubble.classList.add('error');
    thinkingBubble.textContent = '通信エラーが発生しました: ' + err.message;
    setStatus('error');
  } finally {
    isSending = false;
    sendBtn.disabled = false;
    scrollToBottom();
    userInput.focus();
  }
}

pwInput.focus();
</script>

</body>
</html>
